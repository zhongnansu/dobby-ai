name = "dobby-ai-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Create KV namespace: wrangler kv namespace create RATE_LIMIT_KV
# Then paste the id below
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "d4714a769c944734babf5e75732207f7"

# Secrets (set via `wrangler secret put <NAME>`):
# - OPENAI_API_KEY
# - HMAC_SECRET
# - ALLOWED_ORIGINS (comma-separated extension origin IDs)

[vars]
ENABLED = "true"

name: Auto-Labeler

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine changed files and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch files changed in this PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const changedFiles = files.map(f => f.filename);
            core.info(`Changed files: ${changedFiles.join(', ')}`);

            // Label rules: { label, color, match function }
            const rules = [
              {
                label: 'ci',
                color: '6f42c1',
                description: 'Changes to CI/CD workflows',
                match: f => f.startsWith('.github/'),
              },
              {
                label: 'tests',
                color: '0e8a16',
                description: 'Changes to test files',
                match: f => f.startsWith('tests/'),
              },
              {
                label: 'ui',
                color: '1d76db',
                description: 'Changes to UI components',
                match: f => ['popup.js', 'trigger.js'].includes(f),
              },
              {
                label: 'core',
                color: 'd93f0b',
                description: 'Changes to core extension logic',
                match: f => ['detection.js', 'presets.js', 'prompt.js', 'content.js'].includes(f),
              },
              {
                label: 'infra',
                color: 'fbca04',
                description: 'Changes to infrastructure files',
                match: f =>
                  f === 'manifest.json' ||
                  f === 'package.json' ||
                  f === 'package-lock.json' ||
                  f.startsWith('scripts/'),
              },
              {
                label: 'docs',
                color: '0075ca',
                description: 'Documentation changes',
                match: f => f.endsWith('.md'),
              },
            ];

            // Determine which labels to apply
            const labelsToApply = new Set();
            for (const file of changedFiles) {
              for (const rule of rules) {
                if (rule.match(file)) {
                  labelsToApply.add(rule.label);
                }
              }
            }

            if (labelsToApply.size === 0) {
              core.info('No matching labels to apply.');
              return;
            }

            core.info(`Labels to apply: ${[...labelsToApply].join(', ')}`);

            // Ensure labels exist (create if missing)
            const { data: existingLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingNames = new Set(existingLabels.map(l => l.name));

            for (const rule of rules) {
              if (labelsToApply.has(rule.label) && !existingNames.has(rule.label)) {
                core.info(`Creating label: ${rule.label}`);
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: rule.label,
                  color: rule.color,
                  description: rule.description,
                });
              }
            }

            // Apply labels to PR
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [...labelsToApply],
            });

            core.info(`Applied labels: ${[...labelsToApply].join(', ')}`);

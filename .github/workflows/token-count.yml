name: Update token count

on:
  push:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tokens:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: badges
          fetch-depth: 0
      - name: Merge latest main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit || true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: qwibitai/nanoclaw/repo-tokens@v1.2.0
        id: tokens
        with:
          include: 'src/**/*.js'
          exclude: 'src/**/*.test.js'
          badge-path: '.github/badges/tokens.svg'
      - name: Commit and push to badges branch
        run: |
          git add .github/badges/tokens.svg
          git diff --cached --quiet && exit 0
          git commit -m "docs: update token count to ${{ steps.tokens.outputs.tokens }} tokens"
          git push origin badges
